<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Servidor de Arquivos Interno</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f0f0; color: #333; }
        .container { background-color: #fff; padding: 20px; border: 1px solid #ccc; width: 80%; max-width: 600px; }
        h1, h2 { color: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #eee; }
       
  
        .btn-del { color: #cc0000; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
    <h1>Servidor de Arquivos</h1>
    <p>Rede Interna</p>
    
    <hr>

    <h2>Enviar Novo Arquivo</h2>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file">
        <input type="submit" value="Enviar Arquivo">
    </form>

    <hr>

    <h2>Arquivos Disponíveis</h2>
    <table>
        <thead>
            <tr>
                <th>Nome do Arquivo</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% if files %}
                {% for file in files %}
                <tr>
                    <td><a href="/download/{{ file }}">{{ file }}</a></td>
                    <td>
                        <form action="/delete/{{ file }}" method="post" style="margin:0;">
                            <input type="submit" value="Excluir" class="btn-del" onclick="return confirm('Deseja excluir?');"> 
                            </form>
                    </td>
                </tr>
                {% endfor %}
            {% else %}
                <tr>
                    <td colspan="2">Nenhum arquivo encontrado.</td>
                </tr>
            {% endif %}
        </tbody>
    </table>
</div>

</body>
</html>
